
name           = "StrongPNT"
version        = "0.1.0"
defaultTargets = ["StrongPNT"]

[leanOptions]
pp.unicode.fun         = true
autoImplicit           = false
relaxedAutoImplicit    = false
linter.unusedVariables = false

[[lean_lib]]
name = "StrongPNT"

[[require]]
name  = "mathlib"
scope = "leanprover-community"
rev   = "v4.32.0-rc1"

[[require]]
name = "LeanArchitect"
git  = "https://github.com/hanwenzhu/LeanArchitect.git"
rev  = "v4.32.0-rc1"

[[require]]
name = "checkdecls"
git  = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "«doc-gen4»"
git  = "https://github.com/leanprover/doc-gen4"
rev  = "v4.32.0-rc1"
